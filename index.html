<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>알람 앱</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="news/news.css" />
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="app">
    <h1>
      <svg class="title-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="13" r="8" stroke="currentColor" stroke-width="2" />
        <path d="M12 9v4l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M5 3 2 6M19 3l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      알람 앱
    </h1>

    <div class="date" id="date">0000년 00월 00일</div>
    <div class="clock" id="clock">00:00:00</div>
    <div class="weather" id="weather">날씨 불러오는 중...</div>

    <form id="alarm-form" class="alarm-form">
      <input type="date" id="alarm-date" />
      <input type="time" id="alarm-time" required />
      <input type="text" id="alarm-label" placeholder="알람 이름 (선택)" maxlength="20" />
      <button type="submit">알람 추가</button>
    </form>
    <p class="hint">날짜를 비워두면 매일 반복되는 알람으로 등록됩니다.</p>

    <ul id="alarm-list" class="alarm-list"></ul>

    <div class="news-header">
      <button type="button" id="news-toggle-btn" class="news-toggle-btn">
        <svg class="news-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="3" y="4" width="14" height="16" rx="1" stroke="currentColor" stroke-width="2" />
          <path d="M7 8h6M7 12h6M7 16h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <path d="M17 8h3a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <span id="news-toggle-label">최근뉴스</span>
        <span id="news-toggle-arrow" class="news-toggle-arrow">▼</span>
      </button>
      <button type="button" id="news-refresh-btn" class="news-refresh-icon-btn" aria-label="새로고침">
        <svg class="news-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 4v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M20 20v-5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M5.5 9A7 7 0 0 1 19 8M18.5 15A7 7 0 0 1 5 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>
    <div id="news-panel" class="news-panel hidden">
      <ul id="news-list" class="news-list"></ul>
    </div>
  </div>

  <div id="ringing-overlay" class="ringing-overlay hidden">
    <div class="ringing-box">
      <p id="ringing-label">알람!</p>
      <div id="news-briefing" class="news-briefing"></div>
      <button id="stop-alarm">중지</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script src="news/news.js"></script>
</body>
</html>
